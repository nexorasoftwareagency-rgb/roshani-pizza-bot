<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>

<body>

    <!-- LOGIN -->
    <div id="authOverlay">
        <h2>Admin Login</h2>
        <input id="adminEmail" placeholder="Email">
        <input id="adminPassword" type="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <p id="authError"></p>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">

        <div class="topbar">
            <span id="userEmailDisplay"></span>
            <button id="logoutBtn">Logout</button>
        </div>

        <div class="stats">
            <div>Orders: <span id="stat-orders">0</span></div>
            <div>Revenue: <span id="stat-revenue">0</span></div>
            <div>Dishes: <span id="stat-dishes">0</span></div>
        </div>

        <!-- NAV -->
        <div class="nav">
            <button class="nav-item active" data-target="orders">Orders</button>
            <button class="nav-item" data-target="dishes">Dishes</button>
            <button class="nav-item" data-target="categories">Categories</button>
        </div>

        <!-- ORDERS -->
        <div id="orders" class="section active">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody"></tbody>
            </table>
        </div>

        <!-- DISHES -->
        <div id="dishes" class="section">
            <h3>Add Dish</h3>
            <input id="dishName" placeholder="Name">
            <input id="dishPrice" placeholder="Price">
            <input id="dishImage" placeholder="Image URL">
            <input id="dishCategory" placeholder="Category ID">
            <button id="saveDishBtn">Add Dish</button>

            <div id="dishesGrid"></div>
        </div>

        <!-- CATEGORIES -->
        <div id="categories" class="section">
            <h3>Add Category</h3>
            <input id="categoryName" placeholder="Name">
            <input id="categoryImage" placeholder="Image URL">
            <button id="saveCategoryBtn">Add Category</button>

            <div id="categoryList"></div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
        };

        firebase.initializeApp(firebaseConfig);
    </script>

    <script src="app.js"></script>

</body>

</html>
