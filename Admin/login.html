<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Prasant Pizza</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1f1f1f; color: white; margin: 0; }
        .login-box { background: white; color: black; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #ff6b00; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ff6b00; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🍕 Admin Login</h2>
        <input type="password" id="pass" placeholder="Enter Admin Password">
        <button onclick="login()">Login</button>
        <p id="error" style="color:red; display:none">❌ Access Denied</p>
    </div>

    <script>
        function login() {
            const pass = document.getElementById("pass").value;
            // Simple hardcoded password for now
            if (pass === "Admin@123") {
                localStorage.setItem("adminAuth", "true");
                window.location.href = "index.html";
            } else {
                document.getElementById("error").style.display = "block";
            }
        }
    </script>
</body>
</html>
