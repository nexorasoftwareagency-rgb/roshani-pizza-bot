<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org https://raw.githubusercontent.com https://cdnjs.cloudflare.com; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com;">
    <title>Roshani Rider | Secure Authentication</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="login-page">
    <div class="decorative-bg">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div id="loginBox">
        <div class="login-card glass-card">
            <div class="brand">
                <i data-lucide="zap" class="brand-icon"></i>
                <h2>ROSHANI RIDER</h2>
                <p class="login-subtitle">Secured Access Portal</p>
            </div>
            
            <div class="input-group">
                <label for="email">Mobile Number / Email</label>
                <div class="input-wrapper">
                    <i data-lucide="phone"></i>
                    <input type="tel" id="email" placeholder="Enter mobile / email" autocomplete="username" required>
                </div>
            </div>
            
            <div class="input-group">
                <label for="password">Access Password</label>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="password" placeholder="Enter access password" autocomplete="current-password" required minlength="6">
                </div>
            </div>
            
            <button class="btn-primary btn-full mt-20" id="loginBtn" title="Authenticate and enter Rider Dashboard">
                AUTHENTICATE & START <i data-lucide="chevron-right"></i>
            </button>
            <p id="loginError" class="error-msg"></p>
            
            <div class="login-footer mt-20">
                <p class="text-muted-small text-center">Contact Admin if you forgot your code</p>
            </div>
        </div>
    </div>

    <script src="firebase.js"></script>
    <script src="app.js"></script>
</body>
</html>
