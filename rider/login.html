<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; script-src 'self' https://www.gstatic.com https://unpkg.com https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/; style-src 'self' https://fonts.googleapis.com https://unpkg.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss://*.firebaseio.com https://*.firebaseio.com https://*.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.google.com;">
    <meta name="theme-color" content="#FF5200">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Roshani Rider | Secure Authentication</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="../Admin/icon-512.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js" integrity="sha384-tTkFttkBclaU1cloKwOi9xk3pbao3VZxTjLNBt8iFABWDBQibbAbWpVmO28zMuxq" crossorigin="anonymous"></script>

    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #FF5200 0%, #FF2E00 100%);
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px 30px;
            border-radius: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(255, 82, 0, 0.2);
            border: 2px solid rgba(255, 82, 0, 0.1);
            text-align: center;
        }

        .login-logo-box {
            width: 80px;
            height: 80px;
            background: #FFF5F1;
            color: #FF5200;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 8px 20px rgba(255, 82, 0, 0.1);
        }

        .login-logo-box i {
            width: 40px;
            height: 40px;
        }

        .login-card h2 {
            font-weight: 900;
            font-size: 2rem;
            margin-bottom: 8px;
            color: #1E293B;
            letter-spacing: -0.5px;
        }

        .login-card p {
            color: #64748B;
            margin-bottom: 35px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 800;
            color: #1E293B;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 18px;
            color: #94A3B8;
            width: 20px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 18px 15px 18px 50px;
            border: 2px solid #F1F5F9;
            background: #F8FAFC;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-wrapper input:focus {
            border-color: #FF5200;
            background: white;
            box-shadow: 0 0 0 5px rgba(255, 82, 0, 0.05);
        }

        .error-msg {
            background: #FEF2F2;
            color: #EF4444;
            font-size: 0.85rem;
            font-weight: 800;
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.1);
        }
        .hidden { display: none !important; }
    </style>
</head>

<body class="login-page">

    <div class="login-card">
        <div class="login-logo-box">
            <i data-lucide="zap"></i>
        </div>
        <h2>ROSHANI RIDER</h2>
        <p>Secured Access Portal</p>

        <div class="input-group">
            <label for="email">Mobile Number / Email</label>
            <div class="input-wrapper">
                <i data-lucide="phone" aria-hidden="true"></i>
                <input type="text" id="email" placeholder="Enter mobile or email" autocomplete="username" maxlength="50" required aria-required="true">
            </div>
        </div>

        <div class="input-group">
            <label for="password">Access Password</label>
            <div class="input-wrapper">
                <i data-lucide="lock" aria-hidden="true"></i>
                <input type="password" id="password" placeholder="Enter secure password" autocomplete="current-password"
                    maxlength="32" required aria-required="true">
            </div>
        </div>

        <button class="btn-primary full-width mt-10" id="loginBtn" aria-label="Sign In to Rider Portal">
            AUTHENTICATE & START
        </button>
        <p id="loginError" class="error-msg hidden"></p>

        <p class="text-muted text-xtra-small mt-20">Contact Admin if you forgot your credentials</p>
    </div>

    <script type="module" src="app.js?v=4.4.3"></script>
</body>

</html>
