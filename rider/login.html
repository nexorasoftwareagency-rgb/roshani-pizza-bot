<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://*.firebaseio.com https://*.firebasedatabase.app https://unpkg.com https://cdn.jsdelivr.net https://www.gstatic.com https://cdnjs.cloudflare.com https://www.googletagmanager.com https://www.google-analytics.com https://apis.google.com https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob: https://* http://* https://cdnjs.cloudflare.com https://unpkg.com https://*.tile.openstreetmap.org https://placehold.co https://*.googleusercontent.com https://*.gstatic.com; media-src 'self' blob: https://assets.mixkit.co; frame-src https://www.google.com/recaptcha/; object-src 'none'; base-uri 'self'; connect-src 'self' wss://*.firebaseio.com https://*.firebaseio.com https://*.firebasedatabase.app https://*.googleapis.com https://*.firebaseapp.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.google-analytics.com https://region1.google-analytics.com https://raw.githubusercontent.com https://*.tile.openstreetmap.org https://www.google.com https://placehold.co https://fonts.gstatic.com https://www.gstatic.com https://unpkg.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;">
    <meta name="theme-color" content="#E84908">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Roshani Rider | Secure Authentication</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="../Admin/icon-erp-logo.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js" integrity="sha384-tTkFttkBclaU1cloKwOi9xk3pbao3VZxTjLNBt8iFABWDBQibbAbWpVmO28zMuxq" crossorigin="anonymous"></script>

    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #E84908 0%, #E64A00 100%);
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px 30px;
            border-radius: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(232, 73, 8, 0.2);
            border: 2px solid rgba(232, 73, 8, 0.1);
            text-align: center;
        }

        .login-logo-box {
            width: 80px;
            height: 80px;
            background: #FFF5F1;
            color: #E84908;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 8px 20px rgba(232, 73, 8, 0.1);
        }

        .login-logo-box i {
            width: 40px;
            height: 40px;
        }

        .login-card h2 {
            font-weight: 900;
            font-size: 2rem;
            margin-bottom: 8px;
            color: #1E293B;
            letter-spacing: -0.5px;
        }

        .login-card p {
            color: #64748B;
            margin-bottom: 35px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 800;
            color: #1E293B;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 18px;
            color: #94A3B8;
            width: 20px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 18px 15px 18px 50px;
            border: 2px solid #F1F5F9;
            background: #F8FAFC;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-wrapper input:focus {
            border-color: #E84908;
            background: white;
            box-shadow: 0 0 0 5px rgba(232, 73, 8, 0.05);
        }
        .input-wrapper input:focus-visible {
            outline: 2px solid #E84908;
            outline-offset: 2px;
        }

        .error-msg {
            background: #FEF2F2;
            color: #EF4444;
            font-size: 0.85rem;
            font-weight: 800;
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.1);
        }
        .hidden { display: none !important; }
    </style>
</head>

<body class="login-page">

    <div class="login-card">
        <div class="login-logo-box">
            <i data-lucide="zap"></i>
        </div>
        <h2>ROSHANI RIDER</h2>
        <p>Secured Access Portal</p>

        <div class="input-group">
            <label for="email">Mobile Number / Email</label>
            <div class="input-wrapper">
                <i data-lucide="phone" aria-hidden="true"></i>
                <input type="text" id="email" placeholder="Enter mobile or email" autocomplete="username" maxlength="50" required aria-required="true">
            </div>
        </div>

        <div class="input-group">
            <label for="password">Access Password</label>
            <div class="input-wrapper">
                <i data-lucide="lock" aria-hidden="true"></i>
                <input type="password" id="password" placeholder="Enter secure password" autocomplete="current-password"
                    maxlength="32" required aria-required="true">
            </div>
        </div>

        <button class="btn-primary full-width mt-10" id="loginBtn" aria-label="Sign In to Rider Portal">
            AUTHENTICATE & START
        </button>
        <p id="loginError" class="error-msg hidden"></p>

        <p class="text-muted text-xtra-small mt-20">Contact Admin if you forgot your credentials</p>
    </div>

    <script type="module">
        import { auth, signInWithEmailAndPassword, onAuthStateChanged } from './js/firebase.js';

        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        // If already logged in, redirect to dashboard
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'index.html';
        });

        loginBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!email || !password) {
                loginError.textContent = 'Please fill all fields';
                loginError.classList.remove('hidden');
                return;
            }
            loginBtn.disabled = true;
            loginBtn.textContent = 'Authenticating...';
            loginError.classList.add('hidden');
            try {
                // If phone number (10 digits), convert to rider email format
                const emailAddr = /^\d{10}$/.test(email) ? `${email}@rider.com` : email;
                await signInWithEmailAndPassword(auth, emailAddr, password);
                // Redirect handled by onAuthStateChanged
            } catch (e) {
                loginError.textContent = e.code === 'auth/user-not-found'
                    ? 'Account not found. Contact Admin.'
                    : e.code === 'auth/wrong-password'
                    ? 'Incorrect password. Try again.'
                    : 'Login failed. Check credentials.';
                loginError.classList.remove('hidden');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'AUTHENTICATE & START';
            }
        });

        // Init lucide icons
        if (window.lucide) window.lucide.createIcons();
    </script>
</body>

</html>
